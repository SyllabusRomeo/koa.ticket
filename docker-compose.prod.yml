# Production overrides for LogIt on Hetzner / single-server Docker.
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
# TLS bootstrap (after DNS A for logit.koaimpact.app points here, grey-cloud first):
#   ./scripts/init-letsencrypt.sh logit.koaimpact.app ops@koaimpact.app
# See docs/PRODUCTION.md and docs/DEPLOY_HETZNER_CLOUDFLARE_NAMESILO.md

services:
  api:
    restart: unless-stopped
    environment:
      NODE_ENV: production
      COOKIE_SECURE: 'true'
      TRUST_PROXY: '1'
      PORT: 4000

  worker:
    restart: unless-stopped
    environment:
      NODE_ENV: production

  web:
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: /api/v1
      PORT: 3000
      HOSTNAME: 0.0.0.0

  nginx:
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    # Replace base HTTP-only mount (Compose merge would otherwise stack both).
    volumes: !override
      - ./infra/nginx/tls.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/certs:/etc/nginx/certs:ro
      - ./infra/certbot/www:/var/www/certbot:ro

  postgres:
    restart: unless-stopped
    ports: !override
      []

  redis:
    restart: unless-stopped
    ports: !override
      []
