services:
  postgres:
    image: postgres:16-alpine
    ports:
      - '${POSTGRES_HOST_PORT:-15432}:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-logit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_strong_password}
      POSTGRES_DB: ${POSTGRES_DB:-logit}
    # Lean defaults for laptop/dev hosts (override via POSTGRES_SHARED_BUFFERS etc. if needed)
    command:
      - postgres
      - -c
      - shared_buffers=${POSTGRES_SHARED_BUFFERS:-64MB}
      - -c
      - work_mem=${POSTGRES_WORK_MEM:-4MB}
      - -c
      - max_connections=${POSTGRES_MAX_CONNECTIONS:-50}
    mem_limit: ${POSTGRES_MEM_LIMIT:-256m}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - logit

  redis:
    image: redis:7-alpine
    ports:
      - '${REDIS_HOST_PORT:-6379}:6379'
    command:
      - redis-server
      - --appendonly
      - 'yes'
      - --maxmemory
      - ${REDIS_MAXMEMORY:-64mb}
      - --maxmemory-policy
      - allkeys-lru
    mem_limit: ${REDIS_MEM_LIMIT:-96m}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - logit

  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    env_file: .env
    environment:
      PORT: "4000"
      API_PORT: "4000"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-logit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_strong_password}
      POSTGRES_DB: ${POSTGRES_DB:-logit}
      # Entrypoint builds a URL-encoded DATABASE_URL from POSTGRES_* (avoids + / = breakage)
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - upload_data:/data/uploads
    networks:
      - logit

  worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.worker
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-logit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_strong_password}
      POSTGRES_DB: ${POSTGRES_DB:-logit}
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - logit

  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: /api/v1
    environment:
      NEXT_PUBLIC_API_URL: /api/v1
    depends_on:
      - api
    networks:
      - logit

  nginx:
    image: nginx:1.27-alpine
    ports:
      - '${NGINX_PORT:-8180}:80'
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web
    networks:
      - logit

volumes:
  postgres_data:
  redis_data:
  upload_data:

networks:
  logit:
    driver: bridge
